<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#667eea,#764ba2);
}

.login-container{
background:white;
padding:40px;
width:350px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

.login-container h1{
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

input:focus{
outline:none;
border-color:#667eea;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:6px;
background:#667eea;
color:white;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#5563d6;
}

.error{
color:red;
margin-top:10px;
display:none;
}

</style>
</head>

<body>

<div class="login-container">

<h1>Login</h1>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="error" class="error">Invalid username or password</p>

</div>

<script>

function login(){

const username=document.getElementById("username").value;
const password=document.getElementById("password").value;

if(username==="admin" && password==="1234"){
window.location.href="dashboard.html";
}
else{
document.getElementById("error").style.display="block";
}

}

</script>

</body>
</html>
