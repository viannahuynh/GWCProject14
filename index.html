<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalStepper</title>

    <link rel="stylesheet" href="styles.css">

    <style>
    /* ===== Button 52 ===== */
    .button-52 {
      font-size: 16px;
      padding: 13px 20px;
      border: 1px solid black;
      cursor: pointer;
      position: relative;
      background: transparent;
    }

    .button-52:after {
      content: "";
      background-color: #ffe54c;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 7px;
      left: 7px;
      z-index: -1;
      transition: 0.2s;
    }

    .button-52:hover:after {
      top: 0;
      left: 0;
    }

    /* ===== Modal ===== */
    .modal {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.3);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .hidden {
        display: none;
    }

    .modal-content {
        background: white;
        padding: 20px;
        border-radius: 10px;
        width: 300px;
    }

    .modal-content input,
    .modal-content textarea {
        width: 100%;
        margin-bottom: 10px;
        padding: 8px;
    }

    .modal-actions {
        display: flex;
        justify-content: space-between;
    }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div id="navbar">
        <h1>GoalStepper</h1>
    </div>

    <!-- HEADER -->
    <div id="header">
        <h2>fit your goals into your every day life</h2>
    </div>

    <!-- BUTTON -->
    <div id="calendar-section">
        <button id="openModal" class="button-52">Create Event</button>
    </div>

    <!-- SINGLE MODAL -->
    <div id="eventModal" class="modal hidden">
        <div class="modal-content">

            <h2>Create Event</h2>

            <form id="eventForm">
                <input type="text" placeholder="Event Title" required>
                <input type="date">
                <input type="time">
                <input type="time">
                <textarea placeholder="Description"></textarea>

                <div class="modal-actions">
                    <button type="button" id="cancelBtn">Cancel</button>
                    <button type="submit">Save</button>
                </div>
            </form>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
