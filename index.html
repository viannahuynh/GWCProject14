<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Dashboard</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="lastMinuteEventModal" class="modal hidden">
    <div class="modal-content">
        <h2 id="modalTitle">Add a Last Minute Event</h2>

        <form id="lastMinuteEventForm">
            <div class="form-group">
                <label for="eventTitle">Event Title</label>
                <input type="text" id="eventTitle" name="eventTitle">
            </div>

            <div class="form-group">
                <label for="eventDate">Date</label>
                <input type="date" id="eventDate" name="eventDate">
            </div>

            <div class="time-row">
                <div class="form-group">
                    <label for="startTime">Start Time</label>
                    <input type="time" id="startTime" name="startTime">
                </div>

                <div class="form-group">
                    <label for="endTime">End Time</label>
                    <input type="time" id="endTime" name="endTime">
                </div>
            </div>

            <div class="form-group">
                    <label for="description">Description / Notes</label>
                    <textarea id="description" name="description"></textarea>
            </div>

            <div class="modal-actions">
                <button type="submit" id="addEventBtn">Add Event</button>
                <button type="button" id="cancelEventBtn">Cancel</button>
            </div>
        </form>

    </div>
    </div>

    <script src="app.js"></script>
    <div id="navbar">
        <!-- Navigation bar content goes here -->
        <h1>My Calendar App</h1>
    </div>
        
    <div id="header">
        <!-- Header content goes here -->
    </div>
    <div id="calendar-section">
        <!-- Calendar section content goes here -->

        <!-- ====================== Create event button for modal Start ====================== -->
        <button id="open">Create Event</button>

        <!-- Wrapper-->
        <div class="modal-container">
            <!-- Contents -->
            <div class="modal">
                <div class="form-header">
                    <h2>Create Event</h2>
                    <!--Close-->
                    <button id="close" class="form-btn">Close</button>
                </div>
                
                <!--Form start-->
                <form action="#" method="#" id="eventForm">
                    <div>
                        <label for="eventTitle">Event Title</label>
                        <input type="text" id="eventTitle" name="title" placeholder="Birthday / Wedding ...." required>
                    </div>
                    
                    <div>
                        <label for="eventDate">Date</label>
                        <input type="date" id="eventDate" name="date">
                    </div>

                    <div>
                        <label for="startTime">Start Time</label>
                        <input type="time" id="startTime" name="startTime">
                    </div>
                    
                    <div>
                        <label for="endTime">End Time</label>
                        <input type="time" id="endTime" name="endTime">
                    </div>

                    <div>
                        <label for="eventDescription">Description</label>
                        <textarea id="eventDescription" name="description" placeholder="Your text here...." rows="3"></textarea>
                    </div>
                    
                    <div class="modal-actions">
                        <button type="button" id="cancelModalBtn" class="form-btn">Cancel</button>
                        <button type="submit" id="saveEventBtn" class="form-btn">Create Event</button>
                    </div>
                </form>
                <!--Form end-->
            </div>
        </div>
        <!-- ====================== Create event button for modal End ====================== -->
    </div>
    <div id="footer-actions">
        <!-- Footer actions content goes here -->
    </div>

    <script src="app.js"></script>
</body>
</html>
