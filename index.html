<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="navbar">
    <h1>My Calendar App</h1>
  </div>

  <div id="header"></div>

  <div id="calendar-section">
    <!-- Display Area -->
    <div id="eventDisplayArea">
      <div id="eventInfo">
        <p id="eventInfoText">No events yet. Create one!</p>
      </div>
    </div>

    <!-- Buttons -->
    <div class="calendarBtn">
      <button id="openCreateEvent">Create Event</button>
      <button id="openLastMinuteEvent">Add a last minute event</button>
    </div>

    <!-- Calendar Grid -->
    <div id="calendar-grid"></div>
  </div>

  <div id="footer-actions"></div>

  <!-- Create Event Modal -->
  <div id="createEvent" class="modal-container">
    <div class="modal">
      <div class="form-header">
        <h2>Create Event</h2>
        <button id="closeCreateEvent" class="form-btn" type="button">Close</button>
      </div>

      <form id="eventForm">
        <div class="form-group">
          <label for="eventTitle">Event Title</label>
          <input
            type="text"
            id="eventTitle"
            name="title"
            placeholder="Birthday / Wedding ...."
            required
          />
        </div>

        <div class="form-group">
          <label for="eventDate">Date</label>
          <input type="date" id="eventDate" name="date" />
        </div>

        <div class="time-row">
          <div class="form-group">
            <label for="startTime">Start Time</label>
            <input type="time" id="startTime" name="startTime" />
          </div>

          <div class="form-group">
            <label for="endTime">End Time</label>
            <input type="time" id="endTime" name="endTime" />
          </div>
        </div>

        <div class="form-group">
          <label for="eventDescription">Description</label>
          <textarea
            id="eventDescription"
            name="description"
            placeholder="Your text here...."
            rows="3"
          ></textarea>
        </div>

        <div class="modal-actions">
          <button type="button" id="cancelEventBtn" class="form-btn">Cancel</button>
          <button type="submit" id="saveEventBtn" class="form-btn">Create Event</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Last Minute Event Modal -->
  <div id="lastMinute" class="modal-container">
    <div class="modal">
      <div class="form-header">
        <h2>Add a Last Minute Event</h2>
        <button id="closeLastMinuteEvent" class="form-btn" type="button">Close</button>
      </div>

      <form id="lastMinuteForm">
        <div class="form-group">
          <label for="lastMinuteTitle">Event Title</label>
          <input
            type="text"
            id="lastMinuteTitle"
            name="title"
            placeholder="Birthday / Wedding ...."
            required
          />
        </div>

        <div class="form-group">
          <label for="lastMinuteDate">Date</label>
          <input type="date" id="lastMinuteDate" name="date" />
        </div>

        <div class="form-group">
          <label for="lastMinuteDescription">Description</label>
          <textarea
            id="lastMinuteDescription"
            name="description"
            placeholder="Your text here...."
            rows="3"
          ></textarea>
        </div>

        <div class="modal-actions">
          <button type="button" id="cancelLastMinuteBtn" class="form-btn">Cancel</button>
          <button type="submit" id="saveLastMinuteBtn" class="form-btn">Create Event</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
